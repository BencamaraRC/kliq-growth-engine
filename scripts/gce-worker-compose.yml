services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  worker:
    image: europe-west1-docker.pkg.dev/rcwl-development/kliq-growth-engine/worker:latest
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

volumes:
  redis_data:
