name: CI/CD — Build & Deploy to Cloud Run

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  PROJECT_ID: rcwl-development
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev/rcwl-development/kliq-growth-engine

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Lint
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  # ──────────────────────────────────────────────
  # Job 2: Test
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: kliq_growth_engine_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/kliq_growth_engine_test
      CMS_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/kliq_growth_engine_test
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install ".[dev]" psycopg2-binary

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -v --tb=short

  # ──────────────────────────────────────────────
  # Job 3: Build & Deploy (master only)
  # ──────────────────────────────────────────────
  build-and-deploy:
    name: Build & Deploy
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      # Authenticate to GCP via Workload Identity Federation (no JSON key)
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Build API image (no Playwright — for API + Dashboard)
      - name: Build API image
        run: |
          docker build \
            --build-arg INSTALL_PLAYWRIGHT=false \
            -t ${{ env.REGISTRY }}/api:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/api:latest \
            .

      # Build Worker image (with Playwright)
      - name: Build Worker image
        run: |
          docker build \
            --build-arg INSTALL_PLAYWRIGHT=true \
            -t ${{ env.REGISTRY }}/worker:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/worker:latest \
            .

      # Push both images
      - name: Push images
        run: |
          docker push ${{ env.REGISTRY }}/api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/api:latest
          docker push ${{ env.REGISTRY }}/worker:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/worker:latest

      # Run database migrations
      - name: Run migrations
        run: |
          gcloud run jobs execute kliq-migrate \
            --region ${{ env.REGION }} \
            --wait

      # Deploy API
      - name: Deploy API
        run: |
          gcloud run deploy kliq-growth-api \
            --image ${{ env.REGISTRY }}/api:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --min-instances=0 \
            --max-instances=5 \
            --memory=512Mi \
            --cpu=1 \
            --port=8000 \
            --allow-unauthenticated

      # Deploy Worker
      - name: Deploy Worker
        run: |
          gcloud run deploy kliq-growth-worker \
            --image ${{ env.REGISTRY }}/worker:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --min-instances=1 \
            --max-instances=3 \
            --memory=2Gi \
            --cpu=2 \
            --no-cpu-throttling \
            --command="celery" \
            --args="-A,app.workers.celery_app,worker,--loglevel=info,--concurrency=4"

      # Deploy Dashboard
      - name: Deploy Dashboard
        run: |
          gcloud run deploy kliq-growth-dashboard \
            --image ${{ env.REGISTRY }}/api:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --min-instances=0 \
            --max-instances=2 \
            --memory=512Mi \
            --cpu=1 \
            --port=8501 \
            --command="streamlit" \
            --args="run,dashboard/app.py,--server.port=8501,--server.address=0.0.0.0"
